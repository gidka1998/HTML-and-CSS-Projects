<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML 3</title>

    <style>
        .blueText {
            color: blue;
        }

        .redText {
            color: red;
        }
    </style>

</head>

<body>

<div class="blueText">
    <p>This text is blue.</p>
</div>

<div class="redText">
    <p>This text is red.</p>
</div>

</body>
</html>
