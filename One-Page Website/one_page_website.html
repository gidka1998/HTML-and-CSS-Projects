<!DOCTYPE html>
<html>
<head>
    <title>Travel Adventures</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   
 <style>
         body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #0a1f44;
            color: white;
        }

       nav {
    background-color: #06142b;
    padding: 20px;
    text-align: center;
 position: sticky;
    top: 0;
    z-index: 1000;
}

     nav a {
    color: white;
    margin: 0 25px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
}

        nav a:hover {
            color: lightblue;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        
        #home {
    background-image: url("travel.jpg");
    background-size: cover;
    background-position: center;
    height: 400px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;         
    text-align: center;
}


#home h1 {
    font-size: 48px;
    margin: 0;
}

#home p {
    font-size: 20px;
    margin-top: 10px;
}


#home h1, #home p {
    background-color: rgba(0,0,0,0.5);
    padding: 10px;
}

        #gallery {
            background-color: #102a5c;
        }

        #video {
            background-color: #12306b;
        }

        #contact {
            background-color: #102a5c;
        }

       #gallery img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    margin: 10px;
    border-radius: 10px;
}
.video-thumbnail p {
    color: white;
    margin-top: 5px;
    font-weight: bold;
    font-size: 16px;
    text-decoration: underline;
}
        
        form {
            background-color: #06142b;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        form input, textarea {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

form input[type="submit"] {
    width: 100px;
    padding: 8px;
    margin-top: 10px;
    cursor: pointer;
border-radius: 25px;
background-color: #FFFFFF;
}


        footer {
            background-color: #06142b;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#video">Video</a>
    <a href="#contact">Contact</a>
</nav>

<!-- HOME SECTION -->
<section id="home">
    <h1>Travel Adventures</h1>
    <p>Discover amazing places around the world and plan your next trip!</p>
</section>

<!-- IMAGE SECTION -->
<section id="gallery">
    <h2>Photo Gallery</h2>
    <img src="mountain-view.jpg" alt="Mountain view" width="300">
    <img src="beach_sunset.avif" alt="Beach sunset" width="300">
    <img src="city_skyline.jpg" alt="City skyline" width="300">
</section>

<!-- VIDEO SECTION -->
<section id="video">
    <h2>Travel Video</h2>
   
   <a href="https://youtu.be/afKf6WAzfCo?si=sEXTitpAsOPJnnSW" class="video-thumbnail">
    <img src="travel_.jpg" alt="Travel video thumbnail">
    <p>Watch this travel video on YouTube</p>
</a>
</section>


<!-- CONTACT FORM -->
<section id="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Your Message"></textarea><br>
        <input type="submit" value="Send Message">
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>2026 Travel Adventures | Designed by Me</p>
</footer>

</body>
</html>
